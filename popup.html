<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background-color: #f8fafc;
      color: #334155;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 12px;
    }
    
    .header img {
      width: 24px;
      height: 24px;
    }
    
    .header h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: #0f172a;
    }
    
    .setting-group {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }
    
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .setting-info h3 {
      margin: 0 0 4px 0;
      font-size: 14px;
      font-weight: 500;
      color: #1e293b;
    }
    
    .setting-info p {
      margin: 0;
      font-size: 11px;
      color: #64748b;
    }
    
    /* Toggle Switch CSS */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }
    
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #cbd5e1;
      transition: .3s;
      border-radius: 34px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: #2563eb;
    }
    
    input:checked + .slider:before {
      transform: translateX(18px);
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon.png" alt="Logo">
    <h2>Unikorn Phone Search</h2>
  </div>

  <div class="setting-group">
    <div class="setting-row">
      <div class="setting-info">
        <h3>Master Toggle</h3>
        <p>Enable or disable globally.</p>
      </div>
      <label class="switch">
        <input type="checkbox" id="master-toggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="setting-group">
    <div class="setting-row">
      <div class="setting-info">
        <h3>Current Website</h3>
        <p id="domain-label">Whitelist this domain.</p>
      </div>
      <label class="switch">
        <input type="checkbox" id="site-toggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
